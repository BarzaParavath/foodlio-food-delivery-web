<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodlio — The Puzzle</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --white: #ffffff;
            --cream: #faf9f6;
            --platinum: #e5e4e2;
            --gold: #d4af37;
            --dark: #1d3557;
            --accent: #ff474d;
            --radius: 24px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #ffddb7 0%, #fafafa 100%);
            color: var(--dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── BACKGROUND ACCENTS ── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #ffe4e4;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #e0f2f1;
            bottom: -50px;
            right: -50px;
        }

        /* ── COMPONENTS ── */
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
            position: relative;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 12px;
            color: var(--dark);
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* ── BUTTONS ── */
        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffd7a9;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 77, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--platinum);
            color: var(--dark);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── GAME GRID ── */
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px auto 30px;
            width: 300px;
            height: 300px;
            background: #ffebb2;
            padding: 10px;
            border-radius: 12px;
        }

        .tile {
            width: 86.6px;
            height: 86.6px;
            background: var(--white);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--dark);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .tile:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .tile.empty {
            background: transparent;
            cursor: default;
            box-shadow: none;
        }

        .tile::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            pointer-events: none;
        }

        .food-label {
            position: absolute;
            bottom: 4px;
            font-size: 0.6rem;
            color: #aaa;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── STATS ── */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
        }

        /* ── VICTORY ── */
        .victory-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .score-highlight {
            font-size: 3rem;
            color: var(--accent);
            font-weight: 900;
            margin: 10px 0;
            display: block;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .puzzle-grid {
                width: 260px;
                height: 260px;
            }

            .tile {
                width: calc((260px - 20px - 20px) / 3);
                height: calc((260px - 20px - 20px) / 3);
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- ── GATE SCREEN ── -->
    <div id="gate-screen" class="card">
        <h1>Number Puzzle</h1>
        <p>Win the puzzle and earn points for amazing offers!!</p>
        <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 25px;">Are you a premium member?</div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="proceedToGame(true)">Yes, I am</button>
            <button class="btn btn-outline" onclick="proceedToGame(false)">Not yet</button>
        </div>
    </div>

    <!-- ── GAME SCREEN ── -->
    <div id="game-screen" class="card hidden">
        <div class="stats">
            <span>Points: <span id="total-points">0</span></span>
            <span>Moves: <span id="move-count">0</span></span>
        </div>
        <h1>Foodlio Puzzle</h1>
        <p id="game-subtitle">Order the tiles from 1 to 8.</p>

        <div class="puzzle-grid" id="puzzle-grid">
            <!-- Tiles generated by JS -->
        </div>

        <div class="btn-row">
            <button class="btn btn-outline" onclick="resetGame()">Shuffle</button>
            <button class="btn btn-outline" onclick="exitGame()">Exit</button>
        </div>
    </div>

    <!-- ── VICTORY SCREEN ── -->
    <div id="victory-screen" class="card hidden">
        <span class="victory-icon">🍰</span>
        <h1>Deliciously Solved!</h1>
        <p>You've mastered the foodlio challenge!!</p>
        <span class="score-highlight">+1 Point</span>
        <p>Grand Total: <span id="final-points">0</span></p>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="playAgain()">New Game</button>
            <button class="btn btn-outline" onclick="exitGame()">Exit</button>
        </div>
    </div>

    <script>
        let tiles = [1, 2, 3, 4, 5, 6, 7, 8, null];
        let moves = 0;
        let points = parseInt(localStorage.getItem('foodlio_points')) || 0;
        const foodNames = ["Milk", "Flour", "Egg", "Rice", "Sugar", "Coconut", "Garlic", "Salt"];

        function updateStats() {
            document.getElementById('total-points').textContent = points;
            document.getElementById('move-count').textContent = moves;
        }

        function proceedToGame(isPremium) {
            document.getElementById('gate-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            if (isPremium) {
                const subtitle = document.getElementById('game-subtitle');
                subtitle.textContent = "Welcome, VIP! Your exclusive gourmet challenge awaits.";
                subtitle.style.color = "var(--gold)";
            }
            initGame();
        }

        function initGame() {
            shuffleTiles();
            renderTiles();
            updateStats();
        }

        function shuffleTiles() {
            tiles = [1, 2, 3, 4, 5, 6, 7, 8, null];
            // Simulate random moves to ensure solvability
            for (let i = 0; i < 150; i++) {
                const emptyIndex = tiles.indexOf(null);
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
            }
            moves = 0;
        }

        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / 3);
            const col = index % 3;

            if (row > 0) neighbors.push(index - 3);
            if (row < 2) neighbors.push(index + 3);
            if (col > 0) neighbors.push(index - 1);
            if (col < 2) neighbors.push(index + 1);

            return neighbors;
        }

        function renderTiles() {
            const grid = document.getElementById('puzzle-grid');
            grid.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = `tile ${tile === null ? 'empty' : ''}`;
                if (tile !== null) {
                    div.textContent = tile;
                    const label = document.createElement('span');
                    label.className = 'food-label';
                    label.textContent = foodNames[tile - 1];
                    div.appendChild(label);
                    div.onclick = () => moveTile(index);
                }
                grid.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(null);
            const neighbors = getNeighbors(index);

            if (neighbors.includes(emptyIndex)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moves++;
                renderTiles();
                updateStats();
                checkWin();
            }
        }

        function checkWin() {
            const winState = [1, 2, 3, 4, 5, 6, 7, 8, null];
            const isWin = tiles.every((val, i) => val === winState[i]);
            if (isWin) {
                setTimeout(showVictory, 600);
            }
        }

        function showVictory() {
            points++;
            localStorage.setItem('foodlio_points', points);
            document.getElementById('final-points').textContent = points;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
        }

        function playAgain() {
            document.getElementById('victory-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initGame();
        }

        function resetGame() {
            initGame();
        }

        function exitGame() {
            window.location.href = 'index.html';
        }

        // Initialize points display
        updateStats();

    </script>
</body>

</html>
