<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Arrow — Earn Foodlio Points</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF474D;
            --primary-dark: #C1121F;
            --dark: #1D3557;
            --light: #ffffff;
            --glass: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #2b2b2b, #111);
            color: white;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            cursor: crosshair;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .hud-item {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .hud-item span {
            color: var(--primary);
            margin-left: 8px;
        }

        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #game-over-overlay h2 {
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 14px 28px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            font-size: 1rem;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4);
        }

        .btn-home {
            background: #fff;
            color: var(--dark);
        }

        .btn-home:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .intro {
            margin-bottom: 20px;
            text-align: center;
        }

        .intro h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .intro p {
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="intro">
        <h1>🏹 Food Arrow</h1>
        <p>Shoot the food to earn points for your Foodlio wallet!</p>
    </div>

    <div class="game-container">
        <div class="hud">
            <div class="hud-item">Score: <span id="score">0</span></div>
            <div class="hud-item">Arrows: <span id="arrows">5</span></div>
        </div>

        <canvas id="gameCanvas" width="900" height="450"></canvas>

        <div id="game-over-overlay">
            <h2 id="overlay-title">Game Over!</h2>
            <p class="final-score" id="final-score-text">Final Points: 0</p>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
                <a href="index.html" class="btn btn-home">Return Home</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Asset Loading
        const imgTargets = new Image();
        imgTargets.src = "assets/images/game/game_targets_assets_1775269350879.png";

        const imgBowArrow = new Image();
        imgBowArrow.src = "assets/images/game/game_bow_and_arrow_assets_1775269442618.png";

        let assetsLoaded = 0;
        const onAssetLoad = () => {
            assetsLoaded++;
            if (assetsLoaded === 2) {
                // Start game loop only after assets load
                updateUI();
                gameLoop();
            }
        };

        imgTargets.onload = onAssetLoad;
        imgBowArrow.onload = onAssetLoad;

        let score = 0;
        let arrowsLeft = 5;
        let gameOverStatus = false;

        // Arrow Object
        let arrow = {
            x: 80,
            y: 225,
            width: 60,
            height: 15,
            speed: 12,
            active: false
        };

        // Target Classes
        class Target {
            constructor(emoji, speed, type) {
                this.reset(true);
                this.emoji = emoji;
                this.speed = speed;
                this.type = type; // 0: Pizza, 1: Burger, 2: Soda
            }

            reset(firstTime = false) {
                this.x = canvas.width + (firstTime ? Math.random() * 500 : 200);
                this.y = 50 + Math.random() * (canvas.height - 100);
                this.size = 50;
            }

            draw() {
                this.x -= this.speed;

                // Target Visuals (3 styles based on index)
                // Since generated images have targets, we'll draw parts of the targets image.
                // For simplicity with variable generated images, we draw the whole image scaled for now
                // But better is to use the whole image as a sprite.
                // We assume 3 targets in one image, spaced horizontally
                const totalTargets = 3;
                const sourceWidth = imgTargets.width / totalTargets;

                ctx.drawImage(
                    imgTargets,
                    this.type * sourceWidth, 0, sourceWidth, imgTargets.height, // Source
                    this.x, this.y - this.size / 2, this.size, this.size // Destination
                );

                if (this.x < -this.size) {
                    this.reset();
                }
            }
        }

        let targets = [
            new Target("🍕", 3, 0),
            new Target("🍔", 4, 1),
            new Target("🥤", 2.5, 2)
        ];

        // Click to shoot
        canvas.addEventListener("mousedown", (e) => {
            if (!arrow.active && arrowsLeft > 0 && !gameOverStatus) {
                arrow.active = true;
                arrowsLeft--;
                updateUI();
            }
        });

        function updateUI() {
            document.getElementById("score").textContent = score;
            document.getElementById("arrows").textContent = arrowsLeft;
        }

        function drawBow() {
            // Draw Bow Image
            // Assume Bow is on the left half of imgBowArrow
            const bowWidth = imgBowArrow.width / 2;
            ctx.drawImage(
                imgBowArrow,
                0, 0, bowWidth, imgBowArrow.height,
                30, 160, 100, 130
            );
        }

        function drawArrow() {
            if (arrow.active) {
                arrow.x += arrow.speed;
            }

            // Draw Arrow Image (Right half of imgBowArrow)
            const arrowSourceX = imgBowArrow.width / 2;
            ctx.drawImage(
                imgBowArrow,
                arrowSourceX, 0, arrowSourceX, imgBowArrow.height,
                arrow.x, arrow.y - 12.5, arrow.width, arrow.height * 2
            );

            if (arrow.x > canvas.width) {
                arrow.active = false;
                arrow.x = 80;
            }
        }

        function checkCollision() {
            targets.forEach(target => {
                const dx = arrow.x + arrow.width - target.x;
                const dy = arrow.y - target.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (
                    arrow.x < target.x + target.size &&
                    arrow.x + arrow.width > target.x &&
                    arrow.y > target.y - target.size / 2 &&
                    arrow.y < target.y + target.size / 2
                ) {
                    score += 10;
                    arrow.active = false;
                    arrow.x = 80;
                    target.reset();
                    updateUI();

                    // Visual Feedback
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(target.x, target.y, 40, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function showGameOver() {
            gameOverStatus = true;
            document.getElementById("game-over-overlay").style.display = "flex";
            document.getElementById("overlay-title").textContent = score >= 30 ? "Winner! 🎉" : "Good Try!";
            document.getElementById("final-score-text").textContent = `Final Points: ${score}`;
        }

        function gameLoop() {
            if (gameOverStatus) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle background effect
            ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
            for (let i = 0; i < 10; i++) {
                ctx.fillRect(Math.sin(Date.now() * 0.001 + i) * 50 + 400, i * 50, 2, 2);
            }

            drawBow();
            drawArrow();
            targets.forEach(t => t.draw());
            checkCollision();

            if (arrowsLeft === 0 && !arrow.active) {
                setTimeout(showGameOver, 500);
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            score = 0;
            arrowsLeft = 5;
            gameOverStatus = false;
            arrow.x = 80;
            arrow.active = false;
            targets.forEach(t => t.reset(true));
            document.getElementById("game-over-overlay").style.display = "none";
            updateUI();
            gameLoop();
        }

    </script>

</body>

</html>
